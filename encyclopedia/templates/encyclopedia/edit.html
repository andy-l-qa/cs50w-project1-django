{% extends "encyclopedia/layout.html" %}

{% block title %}
    Edit Page
{% endblock %}

{% block body %}
    <form class="edit-form" method="POST" action="{% url 'edit' title %}">
        {% csrf_token %}
        <h1>Edit Page</h1>
        <h2>Title: {{ title }}</h2>
        {{edit_form}}
        <br>
        <input type="submit" class="edit_button" value="Edit">
    </form>
{% endblock %}
