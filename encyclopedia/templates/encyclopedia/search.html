{% extends "encyclopedia/layout.html" %}

{% block title %}
    Search
{% endblock %}

{% block body %}

    {% if possible_entries %}
        <h1>Possible matches:</h1>

        <ul>
            {% for entry in possible_entries %}
                <li><a href="{% url 'wiki' entry %}">{{ entry }}</a></li>
            {% endfor %}
        </ul>

    {% else %}
        <h1>No results matching your search...</h1>
    {% endif %}

{% endblock %}
